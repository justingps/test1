<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Data Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .loading { display: none; text-align: center; margin: 20px 0; }
    .debug-info { background: #f8f9fa; padding: 15px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Work Data Viewer</h1>
    
    <div class="card mb-3">
      <div class="card-body">
        <h5>Select Date</h5>
        <input type="date" id="datePicker" class="form-control mb-2">
        <button id="fetchData" class="btn btn-primary">Get Data</button>
      </div>
    </div>
    
    <div id="loading" class="loading">
      <div class="spinner-border"></div>
      <p>Loading...</p>
    </div>
    
    <div id="dataContainer"></div>
    
    <!-- Debug panel -->
    <div class="debug-info">
      <h5>Debug Information</h5>
      <div id="debugOutput"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  
  <script>
    // Debug function
    function debugLog(message) {
      const debugDiv = document.getElementById('debugOutput');
      debugDiv.innerHTML += `<p>${new Date().toLocaleTimeString()}: ${message}</p>`;
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      debugLog("Page loaded");
      
      flatpickr("#datePicker", {
        dateFormat: "Y-m-d",
        defaultDate: "2025-03-27" // Set to a date you know has data
      });
      
      document.getElementById('fetchData').addEventListener('click', fetchData);
    });
    
    function fetchData() {
      const dateInput = document.getElementById('datePicker').value;
      const loading = document.getElementById('loading');
      const dataContainer = document.getElementById('dataContainer');
      
      debugLog(`Fetching data for date: ${dateInput}`);
      
      if (!dateInput) {
        debugLog("No date selected");
        alert('Please select a date');
        return;
      }
      
      loading.style.display = 'block';
      dataContainer.innerHTML = '';
      
      // REPLACE THIS WITH YOUR ACTUAL SCRIPT URL
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbyDF555wpma2qlk0raWvcX7qjulxSpS-LfqbruIZR29yDCZwhhsPuo0iTv9sX-u_nTi/exec';
      const url = `${scriptUrl}?date=${dateInput}`;
      
      debugLog(`Attempting to fetch from: ${url}`);
      
      fetch(url)
        .then(response => {
          debugLog(`Received response with status: ${response.status}`);
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.json();
        })
        .then(data => {
          debugLog(`Received data: ${JSON.stringify(data)}`);
          loading.style.display = 'none';
          
          if (!data || data.length === 0) {
            dataContainer.innerHTML = '<div class="alert alert-warning">No data found</div>';
            return;
          }
          
          // Simple table display for testing
          let html = '<table class="table"><thead><tr>';
          for (const key in data[0]) {
            html += `<th>${key}</th>`;
          }
          html += '</tr></thead><tbody>';
          
          data.forEach(row => {
            html += '<tr>';
            for (const key in row) {
              html += `<td>${row[key]}</td>`;
            }
            html += '</tr>';
          });
          
          html += '</tbody></table>';
          dataContainer.innerHTML = html;
        })
        .catch(error => {
          debugLog(`Error: ${error.message}`);
          loading.style.display = 'none';
          dataContainer.innerHTML = `
            <div class="alert alert-danger">
              Error: ${error.message}<br>
              Check console for details
            </div>
          `;
          console.error('Error details:', error);
        });
    }
    
    // Trigger first load automatically
    setTimeout(() => {
      document.getElementById('fetchData').click();
    }, 500);
  </script>
</body>
</html>
