<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Data Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
      font-family: Arial, sans-serif;
    }
    .header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    .data-table {
      margin-top: 20px;
      overflow-x: auto;
    }
    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    .table th {
      background-color: #3498db;
      color: white;
    }
    .date-card {
      background-color: #f8f9fa;
      border-radius: 5px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .summary-card {
      background-color: #e8f4fc;
      border-left: 4px solid #3498db;
      padding: 15px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="header">
      <h1><i class="fas fa-hard-hat"></i> Daily Work Report Viewer</h1>
      <p class="lead">View work details by selecting a date</p>
    </div>
    
    <div class="date-card">
      <div class="row">
        <div class="col-md-6">
          <label for="datePicker" class="form-label">Select Date:</label>
          <input type="date" id="datePicker" class="form-control">
        </div>
        <div class="col-md-6 d-flex align-items-end">
          <button id="fetchData" class="btn btn-primary">
            <i class="fas fa-search"></i> Get Work Data
          </button>
        </div>
      </div>
    </div>
    
    <div id="loading" class="loading">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p>Loading work data...</p>
    </div>
    
    <div id="summaryContainer" class="summary-card" style="display: none;">
      <h4>Summary for <span id="selectedDateDisplay"></span></h4>
      <div id="summaryStats"></div>
    </div>
    
    <div id="dataContainer" class="data-table">
      <!-- Data will be displayed here -->
    </div>
  </div>

  <!-- Font Awesome for icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Flatpickr -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize date picker with default as today
      flatpickr("#datePicker", {
        dateFormat: "Y-m-d",
        defaultDate: new Date()
      });
      
      // Fetch data when button is clicked
      document.getElementById('fetchData').addEventListener('click', fetchData);
      
      // Also fetch data when date changes
      document.getElementById('datePicker').addEventListener('change', fetchData);
    });
    
    function fetchData() {
      const dateInput = document.getElementById('datePicker').value;
      const loading = document.getElementById('loading');
      const dataContainer = document.getElementById('dataContainer');
      const summaryContainer = document.getElementById('summaryContainer');
      const selectedDateDisplay = document.getElementById('selectedDateDisplay');
      
      if (!dateInput) {
        alert('Please select a date');
        return;
      }
      
      // Format date for display
      const dateObj = new Date(dateInput);
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      selectedDateDisplay.textContent = dateObj.toLocaleDateString('en-US', options);
      
      // Show loading indicator
      loading.style.display = 'block';
      dataContainer.innerHTML = '';
      summaryContainer.style.display = 'none';
      
      // Replace with your Google Apps Script web app URL
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbxBPdhRuvYUU9Po6UQqVI2R-0uZeJInDew_UYHiGklVOSywRH8axErM1SmkKzs_YNvVfw/exec';
      
      fetch(`${scriptUrl}?date=${dateInput}`)
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(data => {
          loading.style.display = 'none';
          
          if (data.length === 0) {
            dataContainer.innerHTML = '<div class="alert alert-warning">No work data found for the selected date.</div>';
            return;
          }
          
          // Show summary container
          summaryContainer.style.display = 'block';
          
          // Generate summary statistics
          const uniqueForemen = [...new Set(data.map(item => item['FOREMAN ID']))].length;
          const uniqueWorkItems = [...new Set(data.map(item => item['WI NO']))].length;
          const uniqueAreas = [...new Set(data.map(item => item['AREA / BLOCK']))].length;
          
          document.getElementById('summaryStats').innerHTML = `
            <p><strong>${data.length}</strong> work entries | 
            <strong>${uniqueForemen}</strong> foremen | 
            <strong>${uniqueWorkItems}</strong> work items | 
            <strong>${uniqueAreas}</strong> areas/blocks</p>
          `;
          
          // Create table
          let tableHtml = `
            <div class="table-responsive">
              <table class="table table-striped table-hover">
                <thead class="table-dark">
                  <tr>
                    <th>Foreman ID</th>
                    <th>WI NO</th>
                    <th>Area/Block</th>
                    <th>Work Description</th>
                    <th>Resource ID</th>
                    <th>Resource Type</th>
                    <th>Manpower/Equipment</th>
                  </tr>
                </thead>
                <tbody>
          `;
          
          // Add rows
          data.forEach(row => {
            tableHtml += `
              <tr>
                <td>${row['FOREMAN ID'] || '-'}</td>
                <td>${row['WI NO'] || '-'}</td>
                <td>${row['AREA / BLOCK'] || '-'}</td>
                <td>${row['DESCRIPTION OF WORK'] || '-'}</td>
                <td>${row['RESOURCE ID'] || '-'}</td>
                <td>${row['RESOURCE DESIGNATION'] || '-'}</td>
                <td>${row['MANPOWER / EQUIPMENT'] || '-'}</td>
              </tr>
            `;
          });
          
          tableHtml += `
                </tbody>
              </table>
            </div>
          `;
          
          dataContainer.innerHTML = tableHtml;
        })
        .catch(error => {
          loading.style.display = 'none';
          dataContainer.innerHTML = `
            <div class="alert alert-danger">
              <i class="fas fa-exclamation-triangle"></i> Error fetching data: ${error.message}
            </div>
          `;
          console.error('Error:', error);
        });
    }
  </script>
</body>
</html>
